<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRMED FORUM 2026 — Live Poll</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#14233F; --navy2:#1E3357; --gold:#E8A33D; --teal:#0E8A7D;
  --blue:#5B9BD5; --green:#1F7A46; --yellow:#E8A33D; --red:#A93226;
  --white:#FFFFFF; --muted:#B8C4D8;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Sarabun',sans-serif; background:var(--navy); color:var(--white); min-height:100vh;}
.topbar{height:10px; background:var(--teal); border-bottom:4px solid var(--gold);}
.wrap{max-width:720px; margin:0 auto; padding:24px 20px 48px;}
.wrap.wide{max-width:1100px;}
.kicker{color:var(--gold); font-weight:700; letter-spacing:.5px; font-size:15px; margin-bottom:6px;}
h1{font-size:26px; font-weight:800; line-height:1.3; margin-bottom:6px;}
.sub{color:var(--blue); font-size:16px; margin-bottom:22px;}
.card{background:var(--navy2); border-radius:14px; padding:22px; margin-bottom:16px;}
.btn{display:block; width:100%; border:none; border-radius:12px; padding:16px;
  font-family:'Sarabun',sans-serif; font-size:19px; font-weight:700; cursor:pointer; color:var(--white);}
.btn.gold{background:var(--gold); color:var(--navy);}
.btn:active{transform:scale(.98);}
.choice{margin-bottom:12px; text-align:left; padding:16px 18px; line-height:1.35;}
.choice small{display:block; font-weight:400; font-size:14px; opacity:.92; margin-top:3px;}
.choice.g{background:var(--green);}
.choice.y{background:var(--yellow); color:var(--navy);}
.choice.r{background:var(--red);}
.choice.selected{outline:4px solid var(--white);}
.slider-val{font-size:64px; font-weight:800; color:var(--gold); text-align:center; margin:10px 0;}
input[type=range]{width:100%; accent-color:var(--gold); height:34px;}
.stars{display:flex; justify-content:center; gap:10px; font-size:44px; margin:8px 0 4px; cursor:pointer; user-select:none;}
.stars span{opacity:.28; transition:opacity .1s;}
.stars span.on{opacity:1;}
textarea{width:100%; border-radius:10px; border:none; padding:12px; font-family:'Sarabun',sans-serif; font-size:16px; min-height:84px;}
.ok{color:#7BE3A0; font-weight:700; text-align:center; margin-top:12px; min-height:24px;}
.links a{display:block; background:var(--white); color:var(--navy); text-decoration:none; font-weight:700;
  border-radius:10px; padding:14px 16px; margin-bottom:10px;}
.footer{color:var(--muted); font-size:13px; text-align:center; margin-top:26px;}
/* ---------- หน้าแสดงผลสด (ฉายบนจอ) ---------- */
.res-title{font-size:42px; font-weight:800; margin-bottom:4px;}
.res-sub{color:var(--blue); font-size:22px; margin-bottom:26px;}
.bignum{font-size:150px; font-weight:800; color:var(--gold); line-height:1; text-align:center;}
.bignum small{font-size:48px; color:var(--white);}
.count{font-size:24px; color:var(--muted); text-align:center; margin-top:6px;}
.hist{display:flex; align-items:flex-end; gap:10px; height:260px; margin-top:34px;}
.hist .bin{flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; height:100%;}
.hist .bar{width:100%; background:var(--blue); border-radius:8px 8px 0 0; min-height:4px; transition:height .5s;}
.hist .lbl{margin-top:8px; font-size:15px; color:var(--muted);}
.tl-row{display:flex; gap:22px; margin-top:30px;}
.tl{flex:1; border-radius:16px; padding:26px 22px; text-align:center;}
.tl .pct{font-size:84px; font-weight:800; line-height:1;}
.tl .n{font-size:20px; margin-top:6px; opacity:.9;}
.tl .name{font-size:26px; font-weight:800; margin-bottom:12px;}
.tl.g{background:var(--green);} .tl.y{background:var(--yellow); color:var(--navy);} .tl.r{background:var(--red);}
.comments{margin-top:26px; max-height:320px; overflow:hidden;}
.cmt{background:var(--navy2); border-radius:12px; padding:14px 18px; margin-bottom:10px; font-size:20px;}
.cmt small{color:var(--gold); font-weight:700; margin-right:8px;}
.menu a{display:block; background:var(--navy2); color:var(--white); text-decoration:none;
  border-radius:12px; padding:18px; margin-bottom:12px; font-size:20px; font-weight:700;}
.menu a span{color:var(--gold);}
@media(max-width:640px){ .tl-row{flex-direction:column;} .bignum{font-size:96px;} .res-title{font-size:28px;} }
</style>
</head>
<body>
<div class="topbar"></div>
<div id="app" class="wrap"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
/* =====================================================================
   ⚙️ ตั้งค่า — วาง firebaseConfig จากโปรเจกต์ Firebase ของอาจารย์
   (Console > Project settings > Your apps > SDK setup and configuration
    ใช้โปรเจกต์เดียวกับ wheel- ได้เลย เพียงตรวจว่ามี Realtime Database)
   ===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyDuSuIVIbI0UZClQebhKYTLma5xjcFoVP4",
  authDomain: "rtaf-wheel.firebaseapp.com",
  databaseURL: "https://rtaf-wheel-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rtaf-wheel",
  storageBucket: "rtaf-wheel.firebasestorage.app",
  messagingSenderId: "558528892059",
  appId: "1:558528892059:web:01e036c68e2a5c9c4d4a3e"
};

/* 🔗 ลิงก์เอกสารท้ายบรรยาย — แก้ URL สองบรรทัดนี้ */
const SLIDE_URL = "https://drive.google.com/วางลิงก์สไลด์";
const REF_URL   = "https://drive.google.com/วางลิงก์เอกสารอ้างอิง";

const ROOT = "sessions/airmed2026";   // path ใน Realtime Database
/* ===================================================================== */

const CONFIG_READY = !JSON.stringify(firebaseConfig).includes("\u0e27\u0e32\u0e07-");
let db = null;
if (CONFIG_READY) {
  try { firebase.initializeApp(firebaseConfig); db = firebase.database(); }
  catch(e) { console.error(e); }
}
function requireDb(){
  if (db) return true;
  document.getElementById("app").innerHTML = `
    <div class="kicker">AIRMED FORUM 2026</div>
    <h1>ระบบยังไม่พร้อมใช้งาน</h1>
    <div class="card" style="line-height:1.7">
      ผู้ดูแลยังไม่ได้ตั้งค่าการเชื่อมต่อฐานข้อมูล (Firebase)<br>
      โปรดเปิดไฟล์ index.html แล้ววางค่า <b>firebaseConfig</b> ตามคู่มือ README_TH.md ข้อ 1
    </div>`;
  return false;
}

// รหัสประจำเครื่องผู้โหวต — โหวตซ้ำ = แก้คำตอบเดิม (นับหัวไม่ซ้ำ)
function clientId(){
  let id = localStorage.getItem("airmed_cid");
  if(!id){ id = "c" + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
           localStorage.setItem("airmed_cid", id); }
  return id;
}
const qs = new URLSearchParams(location.search);
const app = document.getElementById("app");
const TH = n => n.toLocaleString("th-TH");

/* ============================ หน้าโหวต ============================ */
function pageBattery(){
  app.innerHTML = `
    <div class="kicker">AIRMED FORUM 2026 • กิจกรรมมีส่วนร่วม ๑</div>
    <h1>สัปดาห์นี้ "แบตใจ" ของคุณเหลือกี่เปอร์เซ็นต์?</h1>
    <div class="sub">เลื่อนสไลเดอร์แล้วกดส่ง — ไม่ระบุตัวตน แก้คำตอบได้</div>
    <div class="card">
      <div class="slider-val"><span id="v">50</span>%</div>
      <input type="range" id="sl" min="0" max="100" value="50">
      <button class="btn gold" style="margin-top:18px" onclick="sendBattery()">ส่งคำตอบ</button>
      <div class="ok" id="ok"></div>
    </div>
    <div class="footer">โหวตนิรนาม • ระบบเก็บเฉพาะตัวเลขที่ท่านเลือก</div>`;
  const sl = document.getElementById("sl");
  sl.oninput = () => document.getElementById("v").textContent = sl.value;
  db.ref(`${ROOT}/battery/${clientId()}`).once("value", s => {
    if(s.exists()){ sl.value = s.val().v; document.getElementById("v").textContent = s.val().v;
      document.getElementById("ok").textContent = "ท่านเคยส่งคำตอบแล้ว — เลื่อนใหม่แล้วกดส่งเพื่อแก้ไขได้"; }
  });
}
function sendBattery(){
  const v = +document.getElementById("sl").value;
  db.ref(`${ROOT}/battery/${clientId()}`).set({v, t: Date.now()})
    .then(()=> document.getElementById("ok").textContent = "✓ บันทึกแล้ว ขอบคุณครับ/ค่ะ — ดูผลรวมบนจอใหญ่")
    .catch(e=> document.getElementById("ok").textContent = "ส่งไม่สำเร็จ: " + (e && e.code ? e.code : e));
}

function pageLight(){
  app.innerHTML = `
    <div class="kicker">AIRMED FORUM 2026 • กิจกรรมมีส่วนร่วม ๒</div>
    <h1>๒ สัปดาห์ที่ผ่านมา คุณอยู่ "ไฟสีอะไร"?</h1>
    <div class="sub">แตะเลือก ๑ สี — โหวตนิรนาม เปลี่ยนคำตอบได้</div>
    <button class="btn choice g" data-c="g" onclick="sendLight('g',this)">🟢 ไฟเขียว — เครียดทั่วไป
      <small>ยังนอนหลับดี ทำงานได้ตามปกติ</small></button>
    <button class="btn choice y" data-c="y" onclick="sendLight('y',this)">🟡 ไฟเหลือง — เริ่มกระทบการทำงาน
      <small>นอนไม่หลับ/ซึมเศร้าต่อเนื่อง &gt;๒ สัปดาห์ เริ่มผิดพลาดในงาน</small></button>
    <button class="btn choice r" data-c="r" onclick="sendLight('r',this)">🔴 ไฟแดง — ภาวะวิกฤต
      <small>ต้องการความช่วยเหลือทันที</small></button>
    <div class="ok" id="ok"></div>
    <div class="card" style="margin-top:18px; font-size:15px; line-height:1.55">
      หากท่านอยู่โซนเหลืองหรือแดง — ท่านไม่ได้อยู่ลำพัง ปรึกษาสายด่วนสุขภาพจิต <b>1323</b> (ฟรี ตลอด 24 ชม.)
      หรือหน่วยแพทย์/เพื่อนร่วมงานที่ไว้ใจได้ เนื้อหาช่วงถัดไปมีช่องทางช่วยเหลือเพิ่มเติม
    </div>`;
  db.ref(`${ROOT}/light/${clientId()}`).once("value", s => {
    if(s.exists()) markLight(s.val().c);
  });
}
function markLight(c){
  document.querySelectorAll(".choice").forEach(b => b.classList.toggle("selected", b.dataset.c===c));
}
function sendLight(c, el){
  db.ref(`${ROOT}/light/${clientId()}`).set({c, t: Date.now()})
    .then(()=>{ markLight(c); document.getElementById("ok").textContent = "✓ บันทึกแล้ว — ดูสัดส่วนทั้งห้องบนจอใหญ่"; })
    .catch(e=> document.getElementById("ok").textContent = "ส่งไม่สำเร็จ: " + (e && e.code ? e.code : e));
}

function pageFeedback(){
  app.innerHTML = `
    <div class="kicker">AIRMED FORUM 2026 • ท้ายการบรรยาย</div>
    <h1>ขอบคุณที่รับฟังครับ</h1>
    <div class="sub">ให้คะแนนการบรรยาย + รับเอกสารประกอบ</div>
    <div class="card">
      <div style="text-align:center; font-weight:700; font-size:18px">ความพึงพอใจโดยรวม</div>
      <div class="stars" id="stars">
        <span data-s="1">★</span><span data-s="2">★</span><span data-s="3">★</span><span data-s="4">★</span><span data-s="5">★</span>
      </div>
      <textarea id="cmt" placeholder="ข้อเสนอแนะ หรือสิ่งที่จะนำไปใช้ (ไม่บังคับ)"></textarea>
      <button class="btn gold" style="margin-top:14px" onclick="sendFeedback()">ส่งความคิดเห็น</button>
      <div class="ok" id="ok"></div>
    </div>
    <div class="card links">
      <div style="font-weight:700; margin-bottom:12px">📥 ดาวน์โหลด</div>
      <a href="${SLIDE_URL}" target="_blank">สไลด์การบรรยาย (PDF)</a>
      <a href="${REF_URL}" target="_blank">เอกสารอ้างอิงและเครื่องมือ Traffic-Light Triage</a>
    </div>
    <div class="footer">น.อ.พิทักษ์ อ่อนศิริ • สถาบันเวชศาสตร์การบิน ทอ.</div>`;
  let sel = 0;
  const spans = document.querySelectorAll("#stars span");
  spans.forEach(sp => sp.onclick = () => { sel = +sp.dataset.s;
    spans.forEach(x => x.classList.toggle("on", +x.dataset.s <= sel)); });
  window._getStars = () => sel;
}
function sendFeedback(){
  const s = window._getStars();
  if(!s){ document.getElementById("ok").textContent = "กรุณาแตะเลือกจำนวนดาวก่อนครับ"; return; }
  const c = document.getElementById("cmt").value.trim().slice(0,300);
  db.ref(`${ROOT}/feedback/${clientId()}`).set({s, c, t: Date.now()})
    .then(()=> document.getElementById("ok").textContent = "✓ ขอบคุณสำหรับความคิดเห็นครับ")
    .catch(e=> document.getElementById("ok").textContent = "ส่งไม่สำเร็จ: " + (e && e.code ? e.code : e));
}

/* ===================== หน้าแสดงผลสด (ฉายบนจอใหญ่) ===================== */
function resBattery(){
  document.querySelector(".wrap").classList.add("wide");
  app.innerHTML = `
    <div class="kicker">LIVE • อัปเดตอัตโนมัติ</div>
    <div class="res-title">"แบตใจ" เฉลี่ยของห้องนี้</div>
    <div class="res-sub">สแกน QR บนสไลด์เพื่อร่วมโหวต</div>
    <div class="bignum"><span id="avg">–</span><small>%</small></div>
    <div class="count" id="n">รอคำตอบแรก…</div>
    <div class="hist" id="hist"></div>`;
  const hist = document.getElementById("hist");
  for(let i=0;i<10;i++){
    hist.insertAdjacentHTML("beforeend",
      `<div class="bin"><div class="bar" id="b${i}" style="height:4px"></div><div class="lbl">${i*10}–${i*10+10}</div></div>`);
  }
  db.ref(`${ROOT}/battery`).on("value", snap => {
    const vals = []; snap.forEach(ch => vals.push(+ch.val().v));
    if(!vals.length) return;
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    document.getElementById("avg").textContent = avg.toFixed(0);
    document.getElementById("n").textContent = `จากผู้ร่วมโหวต ${TH(vals.length)} คน`;
    const bins = Array(10).fill(0);
    vals.forEach(v => bins[Math.min(9, Math.floor(v/10))]++);
    const mx = Math.max(...bins, 1);
    bins.forEach((b,i)=> document.getElementById("b"+i).style.height = (b/mx*100||2)+"%");
  });
}

function resLight(){
  document.querySelector(".wrap").classList.add("wide");
  app.innerHTML = `
    <div class="kicker">LIVE • อัปเดตอัตโนมัติ</div>
    <div class="res-title">ห้องประชุมนี้อยู่ "ไฟสีอะไร"</div>
    <div class="res-sub">สแกน QR บนสไลด์เพื่อประเมินตนเอง — โหวตนิรนาม</div>
    <div class="tl-row">
      <div class="tl g"><div class="name">🟢 ไฟเขียว</div><div class="pct" id="pg">–</div><div class="n" id="ng"></div></div>
      <div class="tl y"><div class="name">🟡 ไฟเหลือง</div><div class="pct" id="py">–</div><div class="n" id="ny"></div></div>
      <div class="tl r"><div class="name">🔴 ไฟแดง</div><div class="pct" id="pr">–</div><div class="n" id="nr"></div></div>
    </div>
    <div class="count" id="tot" style="margin-top:22px"></div>`;
  db.ref(`${ROOT}/light`).on("value", snap => {
    const cnt = {g:0,y:0,r:0}; snap.forEach(ch => cnt[ch.val().c]++);
    const tot = cnt.g+cnt.y+cnt.r; if(!tot) return;
    for(const k of ["g","y","r"]){
      document.getElementById("p"+k).textContent = Math.round(cnt[k]/tot*100)+"%";
      document.getElementById("n"+k).textContent = TH(cnt[k])+" คน";
    }
    document.getElementById("tot").textContent = `ผู้ร่วมประเมิน ${TH(tot)} คน`;
  });
}

function resFeedback(){
  document.querySelector(".wrap").classList.add("wide");
  app.innerHTML = `
    <div class="kicker">LIVE • อัปเดตอัตโนมัติ</div>
    <div class="res-title">ผลตอบรับจากผู้ฟัง</div>
    <div class="bignum"><span id="avg">–</span><small> / 5 ★</small></div>
    <div class="count" id="n"></div>
    <div class="comments" id="cs"></div>`;
  db.ref(`${ROOT}/feedback`).on("value", snap => {
    const rows = []; snap.forEach(ch => rows.push(ch.val()));
    if(!rows.length) return;
    const avg = rows.reduce((a,b)=>a+b.s,0)/rows.length;
    document.getElementById("avg").textContent = avg.toFixed(2);
    document.getElementById("n").textContent = `จากผู้ประเมิน ${TH(rows.length)} คน`;
    const cs = document.getElementById("cs"); cs.innerHTML = "";
    rows.filter(r=>r.c).sort((a,b)=>b.t-a.t).slice(0,6).forEach(r =>
      cs.insertAdjacentHTML("beforeend", `<div class="cmt"><small>${"★".repeat(r.s)}</small>${r.c.replace(/</g,"&lt;")}</div>`));
  });
}

/* ============================ เมนู ============================ */
function pageMenu(){
  app.innerHTML = `
    <div class="kicker">AIRMED FORUM 2026 • ระบบโพลสด</div>
    <h1>เมนูสำหรับวิทยากร</h1>
    <div class="sub">หน้า "ผลสด" ใช้ฉายบนจอ (กด F11 เต็มจอ) • หน้า "โหวต" คือปลายทางของ QR</div>
    <div class="menu">
      <a href="?results=battery"><span>▶ ผลสด</span> — แบตใจเฉลี่ยของห้อง</a>
      <a href="?results=light"><span>▶ ผลสด</span> — สัดส่วนไฟเขียว/เหลือง/แดง</a>
      <a href="?results=feedback"><span>▶ ผลสด</span> — คะแนน + ความคิดเห็นผู้ฟัง</a>
      <a href="?q=battery">📱 หน้าโหวต — แบตใจ (QR สไลด์ 4)</a>
      <a href="?q=light">📱 หน้าโหวต — ไฟจราจร (QR สไลด์ 17)</a>
      <a href="?q=feedback">📱 หน้าประเมิน + ดาวน์โหลด (QR สไลด์ปิดท้าย)</a>
    </div>`;
}

const q = qs.get("q"), r = qs.get("results");
if(!requireDb() && (q || r)) { /* แสดงข้อความตั้งค่า */ }
else if(r === "battery") resBattery();
else if(r === "light") resLight();
else if(r === "feedback") resFeedback();
else if(q === "battery") pageBattery();
else if(q === "light") pageLight();
else if(q === "feedback") pageFeedback();
else pageMenu();
</script>
</body>
</html>
